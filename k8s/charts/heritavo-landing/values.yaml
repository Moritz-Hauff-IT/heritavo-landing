image:
  repository: ghcr.io/moritz-hauff-it/heritavo-landing
  tag: ""
  pullPolicy: IfNotPresent

imagePullSecrets:
  - name: ghcr-pull-secret

replicaCount: 2

resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    cpu: 200m
    memory: 256Mi

probe:
  path: /api/health

# Umami-Analytics (self-hosted auf dem internal-Cluster, analytics.hauff.cloud).
# Beide Werte sind oeffentlich — die websiteId landet als data-website-id im
# ausgelieferten HTML. Default leer = Tracking aus (sicheres no-op), die echte
# ID setzt values-prod.yaml.
# ACHTUNG: Der Origin von url muss zusaetzlich als UMAMI_ORIGIN in der CSP in
# next.config.ts stehen — die CSP wird beim Build eingebacken und liest die ENV
# NICHT zur Laufzeit. Host hier aendern => dort mitaendern.
umami:
  url: https://analytics.hauff.cloud/script.js
  websiteId: ""

ingress:
  enabled: true
  className: nginx
  host: heritavo.com
  tls: true
  clusterIssuer: letsencrypt-prod
  # Legacy/Alias-Domains redirecten via Next.js Middleware auf /de canonical
  legacyHosts:
    - www.heritavo.com
    - heritavo.ch
    - www.heritavo.ch
    - heritavo.de
    - www.heritavo.de
    - heritavo.fr
    - www.heritavo.fr
    - heritavo.net
    - www.heritavo.net
    - heritavo.app
    - www.heritavo.app

namespace: heritavo-landing
