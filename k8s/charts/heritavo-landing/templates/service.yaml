apiVersion: v1
kind: Service
metadata:
  name: {{ include "heritavo-landing.fullname" . }}
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: {{ include "heritavo-landing.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: {{ include "heritavo-landing.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
